kapitel:
  titel: "So funktioniert's!"
  untertitel: "Zahlen ordnen, Magisches Dreieck"
  emoji: "📖"
  farbe: "purple"
  zahlenraum: 20
  erklaerungsseite: true

abschnitte:
  - typ: zahlen_ordnen
    titel: "Zahlen ordnen"
    beschreibung: "Sortiere die Zahlen von klein nach groß."
    aufgaben:
      - [5, 2, 8]
    loesungen:
      - [2, 5, 8]

  - typ: magische_dreiecke
    titel: "Magisches Dreieck"
    beschreibung: "Jede Seite des Dreiecks muss die gleiche Summe ergeben."
    dreiecke:
      - zielsumme: 9
        label: "Aufgabe"
        werte: [1, 2, 3, null, null, null]
      - zielsumme: 9
        label: "Lösung"
        werte: [1, 2, 3, 6, 4, 5]
