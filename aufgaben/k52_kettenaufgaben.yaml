kapitel:
  titel: "Kettenaufgaben bis 20"
  untertitel: "Rechne Schritt für Schritt!"
  emoji: "🔗"
  farbe: "orange"
  zahlenraum: 20

abschnitte:
  - typ: kettenaufgaben
    titel: "A  Leichte Ketten"
    schwierigkeit: 1
    aufgaben:
      - "3 + 2 − 1"
      - "5 + 4 − 3"
      - "1 + 6 + 2"
      - "8 − 3 + 4"
      - "7 + 3 − 5"
      - "2 + 8 − 6"

  - typ: kettenaufgaben
    titel: "B  Knifflige Ketten"
    schwierigkeit: 2
    neue_seite: true
    aufgaben:
      - "4 + 5 − 2 + 1"
      - "10 − 3 − 2 + 5"
      - "6 + 4 − 7 + 3"
      - "11 + 5 − 8"
      - "12 − 6 + 4"
      - "7 + 8 − 9"
      - "15 − 7 + 2"
      - "9 + 4 − 5 + 3"
      - "13 − 8 + 6 − 2"
      - "5 + 6 − 3 + 2"

