kapitel:
  titel: "So funktioniert's!"
  untertitel: "Verdoppeln & Halbieren, Rechenraupe, Rechenmauer, Vervielfachen"
  emoji: "📖"
  farbe: "orange"
  zahlenraum: 20
  erklaerungsseite: true

abschnitte:
  - typ: verdoppeln_halbieren
    titel: "Verdoppeln & Halbieren"
    beschreibung: "Beim Verdoppeln rechnest du die Zahl plus sich selbst. Beim Halbieren teilst du die Zahl durch 2. Im Beispiel für das Halbieren von 10 suchst du die Zahl, die mit sich selbst addiert 10 ergibt."
    aufgaben:
      - [4, "doppelt"]
      - [10, "halb"]
    loesungen: [8, 5]

  - typ: rechenraupe
    titel: "Rechenraupe"
    beschreibung: "Rechne Schritt für Schritt von links nach rechts. Jeder Kreis zeigt eine Rechnung oder ein Ergebnis. Ein leerer Kreis ist blau und ist das Ergebnis."
    start: 2
    schritte: ["+3", "+1", "+4"]

  - typ: rechenraupe
    titel: ""
    start: 2
    schritte: ["+3", "+1", "+4"]
    loesungen: [5, 6, 10]

  - typ: rechenmauer
    titel: "Rechenmauer"
    beschreibung: "Jeder Stein ist die Summe der zwei Steine direkt darunter. Rechne von unten nach oben!"
    mauern:
      - - [2, 3, 1]
        - [null, null]
        - [null]
      - - [2, 3, 1]
        - [5, 4]
        - [9]
    mauer_labels: ["Aufgabe", "Lösung"]

  - typ: vervielfachen
    titel: "Vervielfachen"
    beschreibung: "Wie oft musst du die Zahl mit sich selbst addieren, um auf das Ergebnis zu kommen? Zum Beispiel: 2 + 2 + 2 = 6, also passt die 2 dreimal in die 6."
    aufgaben:
      - [2, 6]
    loesungen: [3]

