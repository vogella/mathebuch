kapitel:
  titel: "So funktioniert's!"
  untertitel: "Verdoppeln & Halbieren, Rechenraupe, Rechenmauer, Vervielfachen"
  emoji: "📖"
  farbe: "orange"
  zahlenraum: 20
  erklaerungsseite: true

abschnitte:
  - typ: verdoppeln_halbieren
    titel: "Verdoppeln & Halbieren"
    beschreibung: "Rechne plus sich selbst (doppelt) oder teile gerecht auf (halb)."
    aufgaben:
      - [4, "doppelt"]
      - [10, "halb"]
    loesungen: [8, 5]

  - typ: rechenraupe
    titel: "Rechenraupe"
    beschreibung: "Rechne von links nach rechts immer weiter."
    start: 2
    schritte: ["+3", "+1", "+4"]

  - typ: rechenmauer
    titel: "Rechenmauer"
    beschreibung: "Zwei Steine nebeneinander ergeben den Stein darüber."
    mauern:
      - - [2, 3, 1]
        - [null, null]
        - [null]
      - - [2, 3, 1]
        - [5, 4]
        - [9]
    mauer_labels: ["Aufgabe", "Lösung"]

  - typ: vervielfachen
    titel: "Vervielfachen"
    beschreibung: "Wie oft passt die Zahl in das Ergebnis?"
    aufgaben:
      - [2, 6]
    loesungen: [3]
