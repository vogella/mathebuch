      - [3, 1, null]
      - [3, null, 1]
      - [3, 2, null]
      - [4, 1, null]
      - [4, null, 2]
      - [4, 3, null]
      - [5, 1, null]
      - [5, null, 3]

  - typ: zahlenhaus
    titel: "B  Zahlenhaus"
    beschreibung: "Finde alle Zahlenpaare, die zusammen die Dachzahl ergeben!"
    dachzahlen: [2, 3, 4, 5]
