kapitel:
  titel: "So funktioniert's!"
  untertitel: "Punktefeld und Lückenaufgaben"
  emoji: "📖"
  farbe: "blau"
  zahlenraum: 20
  erklaerungsseite: true

abschnitte:
  - typ: erklaerung
    titel: "Willkommen!"
    zeilen:
      - "In diesem Buch findest du viele verschiedene Rechenaufgaben."
      - "Schau dir die Beispiele an – die grünen Zahlen zeigen die Lösung."
      - ""
      - "*Tipp: Lies die Erklärungen am besten mit Mama oder Papa zusammen!*"

  - typ: punktefeld
    titel: "Punktefeld"
    beschreibung: "Zähle die Punkte und schreibe die Zahl in das Kästchen."
    felder: 10
    aufgaben:
      - 4
    loesungen: [4]

  - typ: lückenaufgaben
    titel: "Lückenaufgaben"
    beschreibung: "Finde die fehlende Zahl für das blaue Kästchen."
    aufgaben:
      - [3, "+", 5, null]
    loesungen:
      - [null, null, 8]
