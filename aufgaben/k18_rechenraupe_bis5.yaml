kapitel:
  titel: "Rechenraupe bis 5"
  untertitel: "Rechne Schritt für Schritt weiter!"
  emoji: "🐛"
  farbe: "gruen"
  zahlenraum: 5

abschnitte:
  - typ: rechenraupe
    titel: "A Rechne Schritt für Schritt!"
    start: 1
    schritte: ["+2", "+1", "+1"]

  - typ: rechenraupe
    titel: "B Vorwärts und zurück!"
    start: 2
    schritte: ["+1", "+2", "-1"]

  - typ: rechenraupe
    titel: "C Immer weiter rechnen!"
    start: 3
    schritte: ["+2", "-1", "+1"]

  - typ: rechenraupe
    titel: "D Rückwärts geht's los!"
    start: 5
    schritte: ["-2", "-1", "+2"]

  - typ: rechenraupe
    titel: "E Große Sprünge!"
    start: 1
    schritte: ["+3", "-2", "+3"]

  - typ: rechenraupe
    titel: "F Hoch und runter!"
    start: 4
    schritte: ["-1", "-2", "+3"]
