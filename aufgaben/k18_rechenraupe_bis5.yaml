kapitel:
  titel: "Rechenraupe bis 5"
  untertitel: "Rechne Schritt für Schritt weiter!"
  emoji: "🐛"
  farbe: "gruen"
  zahlenraum: 5

abschnitte:
  - typ: rechenraupe
    titel: "A"
    start: 1
    schritte: ["+2", "+1", "+1"]

  - typ: rechenraupe
    titel: "B"
    start: 2
    schritte: ["+1", "+2", "-1"]

  - typ: rechenraupe
    titel: "C"
    start: 3
    schritte: ["+2", "-1", "+1"]

  - typ: rechenraupe
    titel: "D"
    start: 5
    schritte: ["-2", "-1", "+2"]

  - typ: rechenraupe
    titel: "E"
    start: 1
    schritte: ["+3", "-2", "+3"]

  - typ: rechenraupe
    titel: "F"
    start: 4
    schritte: ["-1", "-2", "+3"]

  - typ: rechenraupe
    titel: "G"
    start: 0
    schritte: ["+3", "+1", "-2"]

  - typ: rechenraupe
    titel: "H"
    start: 2
    schritte: ["+3", "-1", "-2"]

  - typ: rechenraupe
    titel: "I"
    start: 5
    schritte: ["-3", "+2", "-1"]

  - typ: rechenraupe
    titel: "J"
    start: 0
    schritte: ["+4", "-1", "+1"]
