  untertitel: "Rechne Schritt für Schritt weiter!"
  emoji: "🐛"
  farbe: "gruen"
  zahlenraum: 10

abschnitte:
  - typ: rechenraupe
    titel: "A Rechne Schritt für Schritt!"
    start: 2
    schritte: ["+3", "+4", "-1"]

  - typ: rechenraupe
    titel: "B Vorwärts und zurück!"
    start: 5
    schritte: ["+3", "-2", "+4"]

  - typ: rechenraupe
    titel: "C Immer weiter rechnen!"
    start: 8
    schritte: ["-3", "+5", "-2"]

  - typ: rechenraupe
    titel: "D Rückwärts geht's los!"
    start: 1
    schritte: ["+6", "-4", "+3"]

  - typ: rechenraupe
    titel: "E Große Sprünge!"
    start: 10
    schritte: ["-5", "+3", "-2"]

  - typ: rechenraupe
    titel: "F Hoch und runter!"
    start: 4
    schritte: ["+5", "-3", "+2"]
