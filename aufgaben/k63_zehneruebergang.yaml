kapitel:
  titel: "Über den Zehner"
  untertitel: "Schritt für Schritt über die 10!"
  emoji: "🌉"
  farbe: "orange"
  zahlenraum: 20

abschnitte:
  - typ: zehneruebergang
    titel: "A  Rechne über den Zehner – Addition"
    beschreibung: "Zerlege so, dass du zuerst bis 10 kommst."
    aufgaben:
      # [a, "+", b] – Schüler füllen aus: a + b = a + ___ + ___ = ___
      - [8, "+", 5]
      - [9, "+", 4]
      - [7, "+", 6]
      - [6, "+", 5]
      - [8, "+", 7]
      - [9, "+", 6]
      - [5, "+", 8]
      - [7, "+", 9]

  - typ: zehneruebergang
    titel: "B  Rechne über den Zehner – Subtraktion"
    beschreibung: "Zerlege so, dass du zuerst bis 10 kommst."
    aufgaben:
      # [a, "-", b] – Schüler füllen aus: a - b = a - ___ - ___ = ___
      - [13, "-", 5]
      - [15, "-", 7]
      - [12, "-", 4]
      - [14, "-", 6]
      - [16, "-", 8]
      - [11, "-", 3]
      - [17, "-", 9]
      - [13, "-", 7]
