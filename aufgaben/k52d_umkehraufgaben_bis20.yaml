kapitel:
  titel: "Umkehraufgaben bis 20"
  untertitel: "Rechne Plus und dann Minus zurück."
  emoji: "🌀"
  farbe: "orange"
  zahlenraum: 20

abschnitte:
  - titel: "Größere Umkehraufgaben"
    typ: "umkehraufgaben"
    beschreibung: "Schreibe die Plusaufgabe und die dazu passende Minusaufgabe."
    aufgaben:
      - [12, "+", 5, 17]
      - [11, "+", 8, 19]
      - [14, "+", 3, 17]
      - [15, "+", 4, 19]
  - titel: "Finde die Umkehrung"
    typ: "umkehraufgaben"
    neue_seite: true
    beschreibung: "Finde die passenden Aufgaben."
    aufgaben:
      - [18, "−", 6, 12]
      - [17, "−", 5, 12]
      - [19, "−", 8, 11]
      - [20, "−", 10, 10]
