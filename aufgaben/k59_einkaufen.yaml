kapitel:
  titel: "Einkaufen"
  untertitel: "Rechne mit Preisen!"
  emoji: "🛒"
  farbe: "pink"
  zahlenraum: 20

abschnitte:
  - typ: einkaufen
    titel: "A  Was kostet das zusammen?"
    beschreibung: "Rechne die Preise zusammen!"
    aufgaben:
      - artikel:
          - {name: "Apfel", preis: 2}
          - {name: "Birne", preis: 3}
        frage: "Wie viel kosten beide zusammen?"
      - artikel:
          - {name: "Brot", preis: 4}
          - {name: "Butter", preis: 3}
        frage: "Wie viel kosten beide zusammen?"
      - artikel:
          - {name: "Milch", preis: 2}
          - {name: "Käse", preis: 5}
          - {name: "Ei", preis: 1}
        frage: "Wie viel kostet alles zusammen?"
      - artikel:
          - {name: "Saft", preis: 3}
          - {name: "Banane", preis: 1}
          - {name: "Joghurt", preis: 2}
        frage: "Wie viel kostet alles zusammen?"
    loesungen: [5, 7, 8, 6]

  - typ: einkaufen
    neue_seite: true
    titel: "B  Wie viel Rückgeld?"
    beschreibung: "Du bezahlst mit dem angegebenen Betrag. Wie viel bekommst du zurück?"
    aufgaben:
      - artikel:
          - {name: "Eis", preis: 3}
        frage: "Du bezahlst mit 5€. Wie viel Rückgeld?"
      - artikel:
          - {name: "Saft", preis: 4}
          - {name: "Keks", preis: 2}
        frage: "Du bezahlst mit 10€. Wie viel Rückgeld?"
    loesungen: [2, 4]

  - typ: einkaufen_euro_cent
    neue_seite: true
    titel: "C  Euro und Cent zusammenrechnen"
    beschreibung: "Rechne Euro und Cent getrennt zusammen!"
    aufgaben:
      - artikel:
          - {name: "Apfel", euro: 1, cent: 8}
          - {name: "Birne", euro: 2, cent: 3}
      - artikel:
          - {name: "Brötchen", euro: 0, cent: 9}
          - {name: "Butter", euro: 3, cent: 5}
      - artikel:
          - {name: "Milch", euro: 1, cent: 6}
          - {name: "Joghurt", euro: 2, cent: 4}
      - artikel:
          - {name: "Saft", euro: 3, cent: 7}
          - {name: "Keks", euro: 1, cent: 2}
      - artikel:
          - {name: "Banane", euro: 0, cent: 5}
          - {name: "Traube", euro: 1, cent: 9}

  - typ: einkaufen_euro_cent
    neue_seite: true
    titel: "D  Drei Sachen einkaufen"
    beschreibung: "Rechne Euro und Cent getrennt zusammen!"
    schwierigkeit: 1
    aufgaben:
      - artikel:
          - {name: "Ei", euro: 0, cent: 8}
          - {name: "Mehl", euro: 1, cent: 3}
          - {name: "Zucker", euro: 2, cent: 4}
      - artikel:
          - {name: "Apfel", euro: 1, cent: 2}
          - {name: "Birne", euro: 2, cent: 5}
          - {name: "Banane", euro: 0, cent: 7}
      - artikel:
          - {name: "Brot", euro: 3, cent: 1}
          - {name: "Käse", euro: 2, cent: 6}
          - {name: "Wurst", euro: 1, cent: 3}
      - artikel:
          - {name: "Milch", euro: 1, cent: 4}
          - {name: "Saft", euro: 2, cent: 3}
          - {name: "Wasser", euro: 0, cent: 8}
