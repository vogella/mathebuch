      - "Suche im Supermarkt oder zu Hause nach Zahlen von 1 bis 10."
      - "Auf welchen Lebensmitteln siehst du die Zahlen?"
      - ""
      - "## 🚗 Parkplatz-Experte"
      - "Zähle die Autos auf einem Parkplatz. Welche Farbe gibt"
      - "es am häufigsten (bis 10 Autos)?"
      - ""
      - "## 🧦 Socken-Sortierer"
      - "Such dir 10 Socken und sortiere sie zu Paaren. Wie viele"
      - "Paare hast du am Ende?"

