kapitel:
  titel: "So funktioniert's!"
  untertitel: "Magisches Quadrat, Textaufgaben, Rechen-Labyrinth"
  emoji: "📖"
  farbe: "blau"
  zahlenraum: 20
  erklaerungsseite: true

abschnitte:
  - typ: magisches_quadrat
    titel: "Magisches Quadrat"
    beschreibung: "In jeder Reihe und Spalte muss die Summe gleich sein."
    zielsumme: 15
    werte: [2, null, null, null, 5, null, null, null, 8]
    paar:
      label_links: "Aufgabe"
      label_rechts: "Lösung"
      werte: [2, 7, 6, 9, 5, 1, 4, 3, 8]

  - typ: rechenweg_labyrinth
    titel: "Rechen-Labyrinth – Aufgabe"
    beschreibung: "Wähle in jeder Spalte genau EINE Zahl. Zusammen müssen sie das Ziel ergeben."
    aufgaben:
      - zielsumme: 10
        spalten:
          - [3, 5]
          - [2, 7]

  - typ: rechenweg_labyrinth
    titel: "Rechen-Labyrinth – Lösung"
    beschreibung: "Die richtigen Zahlen sind grün markiert und mit dicken Linien verbunden."
    aufgaben:
      - zielsumme: 10
        spalten:
          - [3, 5]
          - [2, 7]
    loesungen:
      - [0, 1]

  - typ: erklaerung
    titel: "Textaufgaben"
    zeilen:
      - "Lies genau und überlege: Musst du plus (+) oder minus (-) rechnen?"
      - "**Beispiel: Anna hat 3 Äpfel. Ben gibt ihr 4 dazu → 3 + 4 = 7 Äpfel**"
