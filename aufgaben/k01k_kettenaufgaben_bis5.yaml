kapitel:
  titel: "Kettenaufgaben bis 5"
  untertitel: "Rechne Schritt für Schritt!"
  emoji: "🔗"
  farbe: "gruen"
  zahlenraum: 5

abschnitte:
  - typ: kettenaufgaben
    titel: "A  Rechne die Kette aus!"
    aufgaben:
      - "1 + 1 + 1"
      - "2 + 1 + 1"
      - "3 + 1 − 2"
      - "1 + 2 + 2"
      - "4 − 1 − 1"
      - "5 − 2 − 1"
      - "2 + 2 − 1"
      - "3 − 1 + 2"
      - "1 + 3 − 2"
      - "5 − 3 + 1"
