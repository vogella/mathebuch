kapitel:
  titel: "So funktioniert's!"
  untertitel: "Dungeon-Flucht – Finde den richtigen Weg"
  emoji: "📖"
  farbe: "gruen"
  zahlenraum: 10
  erklaerungsseite: true

abschnitte:
  - typ: erklaerung
    titel: "Der Weg durch den Dungeon"
    zeilen:
      - "1. Löse zuerst die Rechenaufgabe oben."
      - "   Beispiel: 2 + 1 = 3"
      - ""
      - "2. Suche nun den Weg vom Eingang zum Ausgang."
      - "   Du darfst nur auf Felder mit der Lösung (3) treten!"
      - ""
      - "3. Du darfst nur nach oben, unten, links oder rechts gehen."
      - "   Nicht diagonal! Jeder Schritt geht nur ein Feld weiter."
      - "   Die Felder müssen alle zusammenhängen – kein Sprung!"
      - ""
      - "4. Die Gitter werden größer: 4×4, dann 5×5, dann 6×6 Felder."
      - ""
      - "## Beispiel"
      - "**Rechne: 2 + 1 = 3  (★ = richtiger Weg)**"
      - "Eingang ▼"
      - "★ [ 1 ] [ 4 ]"
      - "★ [ ★ ] [ 2 ]"
      - "[ 5 ] ★ [ 1 ]"
      - "      Ausgang ▼"
