kapitel:
  titel: "Umkehraufgaben bis 10"
  untertitel: "Finde die passende Umkehraufgabe!"
  emoji: "🔄"
  farbe: "blau"
  zahlenraum: 10

abschnitte:
  - titel: "Von Plus zu Minus"
    typ: "umkehraufgaben"
    beschreibung: "Rechne erst die Plusaufgabe und finde dann die passende Umkehraufgabe."
    aufgaben:
      - [3, "+", 4, 7]
      - [2, "+", 6, 8]
      - [5, "+", 2, 7]
      - [1, "+", 9, 10]
      - [4, "+", 5, 9]
      - [6, "+", 2, 8]
      - [3, "+", 5, 8]
      - [2, "+", 7, 9]
  - titel: "Von Minus zu Plus"
    typ: "umkehraufgaben"
    neue_seite: true
    beschreibung: "Finde die passende Plusaufgabe zu jeder Minusaufgabe."
    aufgaben:
      - [9, "−", 4, 5]
      - [8, "−", 3, 5]
      - [7, "−", 6, 1]
      - [10, "−", 2, 8]
      - [6, "−", 3, 3]
      - [5, "−", 1, 4]
      - [8, "−", 4, 4]
      - [9, "−", 7, 2]
