kapitel:
  titel: "So funktioniert's!"
  untertitel: "Zahlenhaus, Würfelzählen, Tauschaufgaben, Zahlzerlegung"
  emoji: "📖"
  farbe: "gruen"
  zahlenraum: 20
  erklaerungsseite: true

abschnitte:
  - typ: zahlenhaus
    titel: "Zahlenhaus"
    beschreibung: "Welche zwei Zahlen ergeben zusammen die Zahl im Dach?"
    verboten: [1, 2]
    dachzahlen: [7]
    loesungen:
      - [3, 4]

  - typ: würfelzählen
    titel: "Würfelzählen"
    beschreibung: "Zähle alle Würfelpunkte zusammen."
    aufgaben:
      - [4, 5]
    loesungen: [9]

  - typ: tauschaufgaben
    titel: "Tauschaufgaben"
    beschreibung: "Tausche die Zahlen – das Ergebnis bleibt gleich!"
    aufgaben:
      - [3, 5]
    loesungen: [8]

  - typ: zahlzerlegung
    titel: "Zahlzerlegung"
    beschreibung: "Teile die obere Zahl in zwei Teile auf."
    zerlegung_labels: ["Aufgabe", "Lösung"]
    aufgaben:
      - [8, 3, null]
      - [8, 3, 5]
