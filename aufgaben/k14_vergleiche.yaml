kapitel:
  titel: "Vergleiche bis 20"
  untertitel: "Setze >, < oder = ein!"
  emoji: "⚖️"
  farbe: "purple"
  zahlenraum: 20

abschnitte:
  - typ: vergleiche
    titel: "A  Vergleiche die Zahlen"
    aufgaben:
      - [12, 15]
      - [18, 18]
      - [14, 9]
      - [7, 16]
      - [11, 11]
      - [20, 13]
      - [6, 17]
      - [19, 19]
      - [13, 8]
      - [15, 20]

  - typ: vergleiche
    titel: "B  Vergleiche die Rechnungen"
    aufgaben:
      - ["8 + 5", "6 + 7"]
      - ["15 − 3", "9 + 2"]
      - ["10 + 7", "8 + 8"]
      - ["14 − 4", "5 + 5"]
      - ["11 + 3", "7 + 8"]
      - ["16 − 6", "4 + 7"]
      - ["9 + 9", "20 − 3"]
      - ["12 + 5", "8 + 9"]
