kapitel:
  titel: "Größer, Kleiner oder Gleich?"
  untertitel: "Setze >, < oder = ein!"
  emoji: "⚖️"
  farbe: "purple"
  zahlenraum: 20

abschnitte:
  - typ: vergleiche
    titel: "A  Vergleiche die Zahlen"
    aufgaben:
      - [3, 5]
      - [7, 7]
      - [9, 4]
      - [2, 8]
      - [6, 6]
      - [10, 3]
      - [1, 5]
      - [8, 8]
      - [4, 9]
      - [7, 2]

  - typ: vergleiche
    titel: "B  Vergleiche die Rechnungen"
    aufgaben:
      - ["3 + 2", "4 + 1"]
      - ["7 − 3", "2 + 1"]
      - ["5 + 5", "8 + 2"]
      - ["9 − 4", "3 + 3"]
      - ["6 + 1", "4 + 4"]
      - ["8 − 2", "3 + 3"]
      - ["10 − 5", "2 + 2"]
      - ["4 + 3", "5 + 2"]
