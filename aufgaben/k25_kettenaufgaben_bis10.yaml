kapitel:
  titel: "Kettenaufgaben bis 10"
  untertitel: "Rechne Schritt für Schritt!"
  emoji: "🔗"
  farbe: "orange"
  zahlenraum: 10

abschnitte:
  - typ: kettenaufgaben
    titel: "A  Rechne die Kette aus!"
    aufgaben:
      - "3 + 2 + 1"
      - "5 + 3 − 2"
      - "4 + 4 − 1"
      - "6 − 3 + 2"
      - "1 + 5 + 3"
      - "8 − 4 + 1"
      - "7 − 2 − 3"
      - "2 + 6 − 5"
      - "9 − 4 − 3"
      - "3 + 3 + 4"
      - "5 − 2 + 4"
