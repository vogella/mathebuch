          - "Ich bin größer als 3."
          - "Ich bin ungerade."
      - hinweise:
          - "Ich bin größer als 10."
          - "Ich bin kleiner als 15."
          - "Wenn du mich halbierst, bekommst du 6."
      - hinweise:
          - "Ich bin die Summe von 3 und 4."
          - "Ich bin ungerade."
          - "Ich bin kleiner als 8."
      - hinweise:
          - "Ich bin größer als 15."
