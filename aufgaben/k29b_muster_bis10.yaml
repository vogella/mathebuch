kapitel:
  titel: "Muster fortsetzen"
  untertitel: "Welche Zahl oder Form kommt als nächstes?"
  emoji: "🌀"
  farbe: "blau"
  zahlenraum: 10

abschnitte:
  - typ: muster_fortsetzen
    titel: "A  Zahlenmuster"
    beschreibung: "Finde die Regel und setze das Muster fort."
    aufgaben:
      - elemente: [0, 2, 4, null, null, null]
      - elemente: [1, 3, 5, null, null, null]
      - elemente: [10, 8, 6, null, null, null]
      - elemente: [2, 5, 8, null]
    loesungen:
      - [6, 8, 10]
      - [7, 9, 11] # wait, zr 10? let's stick to 10
      - [4, 2, 0]
      - [11]

  - typ: muster_fortsetzen
    titel: "B  Formenmuster"
    beschreibung: "Welche Form kommt als nächstes? Male sie!"
    aufgaben:
      - elemente: ["kreis:rot", "quadrat:blau", "kreis:rot", "quadrat:blau", null, null]
      - elemente: ["dreieck:gruen", "dreieck:gruen", "kreis:gelb", "dreieck:gruen", "dreieck:gruen", null]
      - elemente: ["quadrat:orange", "kreis:orange", "quadrat:orange", "kreis:orange", null, null]
    loesungen:
      - ["kreis:rot", "quadrat:blau"]
      - ["kreis:gelb"]
      - ["quadrat:orange", "kreis:orange"]
