kapitel:
  titel: "Textaufgaben bis 5"
  untertitel: "Lies genau und rechne!"
  emoji: "📝"
  farbe: "blau"
  zahlenraum: 5

abschnitte:
  - typ: textaufgaben
    titel: "A  Sachaufgaben"
    aufgaben:
      - text: "2 Ritter haben jeweils 2 Pferde. Wie viele Pferde haben sie zusammen?"
        hinweis: "Tipp: Zusammenzählen!"
      - text: "Im Korb liegen 3 Äpfel. Mama legt noch 2 dazu. Wie viele Äpfel sind es jetzt?"
      - text: "Paul hat 5 Bonbons. Er isst 2 davon auf. Wie viele Bonbons hat er noch?"
      - text: "Im Nest sitzen 3 Vögel. Dann fliegt 1 weg. Wie viele Vögel sitzen noch im Nest?"
    loesungen: [4, 5, 3, 2]

  - typ: textaufgaben
    titel: "B  Mehr Geschichten"
    beschreibung: "Wie viele sind es?"
    aufgaben:
      - text: "Im Park fliegen 3 Drachen. 2 weitere Drachen steigen auf. Wie viele sind es?"
        antwort: 5
      - text: "5 Schmetterlinge sitzen auf einer Blume. 2 fliegen weg. Wie viele bleiben?"
        antwort: 3
      - text: "Ein Kind hat 4 rote Autos und 1 blaues Auto. Wie viele Autos hat es?"
        antwort: 5
      - text: "Auf dem Tisch liegen 5 Stifte. Lena nimmt 3 weg. Wie viele liegen noch da?"
        antwort: 2
