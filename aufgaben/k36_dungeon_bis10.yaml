kapitel:
  titel: "Dungeon-Flucht bis 10"
  untertitel: "Rechne und finde den Weg!"
  emoji: "🏰"
  farbe: "blau"
  zahlenraum: 10

abschnitte:
  - typ: dungeon_flucht
    titel: "A  Entkomme dem Dungeon!"
    beschreibung: "Löse die Aufgabe. Folge dann den Feldern mit der Lösung vom Eingang zum Ausgang!"
    aufgaben:
      - aufgabe: "3 + 4"
        antwort: 7
        eingang: 2
        ausgang: 3
        grid:
          - [3, 5, 7, 2, 9]
          - [8, 1, 7, 4, 6]
          - [4, 6, 7, 7, 3]
          - [9, 2, 5, 7, 1]
          - [3, 8, 4, 7, 6]

  - typ: dungeon_flucht
    titel: "B  Noch tiefer im Dungeon!"
    aufgaben:
      - aufgabe: "5 + 3"
        antwort: 8
        eingang: 0
        ausgang: 3
        grid:
          - [8, 3, 5, 2]
          - [8, 8, 1, 9]
          - [3, 6, 8, 5]
          - [7, 2, 8, 8]

  - typ: dungeon_abenteuer
    titel: "C  Finde den Weg!"
    beschreibung: "Rechne immer weiter, um den nächsten Raum zu finden!"
    aufgaben:
      - eingang: 2
        pfad: ["+ 2", "- 4", "+ 5"]
        ausgang: 3
        grid:
          - [1, 3, 5, 7, 2]
          - [4, 6, 7, 2, 9]
          - [9, 3, 1, 5, 4]
          - [2, 8, 4, 8, 3]
          - [5, 1, 6, 8, 7]
