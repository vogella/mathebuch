kapitel:
  titel: "So funktioniert's!"
  untertitel: "Zahlenstrahl, Vergleiche, Kettenaufgaben"
  emoji: "📖"
  farbe: "pink"
  zahlenraum: 20
  erklaerungsseite: true

abschnitte:
  - typ: zahlenstrahl
    titel: "Zahlenstrahl"
    beschreibung: "Welche Zahlen fehlen in der Reihe?"
    strahlen:
      - von: 0
        bis: 5
        werte: [0, null, 2, null, 4, null]
        loesungen: [null, 1, null, 3, null, 5]

  - typ: vergleiche
    titel: "Vergleiche"
    beschreibung: "Schreibe >, < oder = in den Kreis."
    aufgaben:
      - [3, 5]
      - [7, 7]
    loesungen: ["<", "="]

  - typ: kettenaufgaben
    titel: "Kettenaufgaben"
    beschreibung: "Rechne die lange Kette Schritt für Schritt aus."
    aufgaben:
      - "3 + 2 − 1"
    loesungen: [4]
