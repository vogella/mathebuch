kapitel:
  titel: "Dungeon-Flucht bis 20"
  untertitel: "Rechne und finde den Weg hinaus!"
  emoji: "🏰"
  farbe: "orange"
  zahlenraum: 20

abschnitte:
  - typ: dungeon_abenteuer
    titel: "A  Entkomme dem großen Dungeon!"
    beschreibung: "Rechne immer weiter, um den nächsten Raum zu finden!"
    aufgaben:
      - eingang: 1
        pfad: ["+ 7", "- 3", "+ 5", "- 2", "+ 4", "- 6"]
        ausgang: 4
        grid:
          - [3, 10, 8, 12, 6]
          - [7, 17, 14, 11, 4]
          - [9, 18, 19, 17, 5]
          - [14, 6, 11, 15, 15]
          - [3, 17, 9, 12, 9]

      - eingang: 3
        pfad: ["- 4", "+ 6", "- 3", "+ 8", "- 5"]
        ausgang: 1
        grid:
          - [8, 15, 6, 16, 19]
          - [14, 7, 12, 12, 9]
          - [5, 18, 18, 15, 4]
          - [20, 13, 23, 3, 10]
          - [6, 18, 15, 8, 11]

  - typ: dungeon_abenteuer
    titel: "B  Der letzte Dungeon!"
    beschreibung: "Rechne immer weiter, um den nächsten Raum zu finden!"
    aufgaben:
      - eingang: 0
        pfad: ["+ 5", "+ 3", "- 4", "+ 6", "- 2"]
        ausgang: 4
        grid:
          - [11, 15, 6, 19, 3]
          - [14, 16, 11, 9, 16]
          - [5, 18, 19, 12, 4]
          - [17, 11, 15, 3, 10]
          - [6, 13, 11, 8, 13]

      - eingang: 4
        pfad: ["- 3", "+ 7", "- 5", "+ 4", "- 6"]
        ausgang: 0
        grid:
          - [18, 5, 12, 7, 14]
          - [11, 18, 9, 16, 4]
          - [6, 13, 15, 1, 20]
          - [15, 7, 10, 18, 3]
          - [10, 19, 5, 14, 8]

  - typ: dungeon_abenteuer
    titel: "C  Abenteuer bis 20!"
    beschreibung: "Rechne immer weiter, um den nächsten Raum zu finden!"
    aufgaben:
      - eingang: 1
        pfad: ["+ 5", "+ 3", "- 2", "- 4", "+ 7", "- 6"]
        ausgang: 3
        grid:
          - [5, 10, 8, 12, 6]
          - [7, 15, 13, 11, 4]
          - [9, 18, 16, 12, 5]
          - [14, 6, 11, 19, 15]
          - [3, 17, 9, 13, 20]
