kapitel:
  titel: "Mathe im Alltag – Bis 5"
  untertitel: "Rechnen und Entdecken in deiner Welt"
  emoji: "🌳"
  farbe: "gruen"
  zahlenraum: 5

abschnitte:
  - typ: erklaerung
    titel: "Spiele für zwischendurch"
    illustration: "hand:3"
    zeilen:
      - "## Finger-Flitzer"
      - "Verstecke deine Hände hinter dem Rücken. Zeige dann blitzschnell"
      - "einige Finger (0 bis 5). Dein Partner muss so schnell wie möglich"
      - "die richtige Zahl rufen!"
      - ""
      - "## Würfel-Wettlauf"
      - "Würfelt abwechselnd mit einem Würfel. Wer zuerst genau eine 5"
      - "würfelt, bekommt einen Punkt. Wer hat zuerst 3 Punkte?"
      - ""
      - "## Küchen-Helfer"
      - "Zähle beim Kochen oder Essen Dinge bis 5: Wie viele Äpfel"
      - "liegen in der Schale? Wie viele Gabeln brauchen wir für den Tisch?"
      - ""
      - "## Wettzählen"
      - 'Spielt zu zweit: Ein Kind ruft laut „Rückwärts!" oder „Vorwärts!"'
      - "Das andere Kind muss dann schnell rückwärts von 5 runter zählen"
      - "(5, 4, 3, 2, 1, 0) oder vorwärts von 0 hoch zählen (0, 1, 2, 3, 4, 5)."
      - "Wer am schnellsten fertig ist, gewinnt einen Punkt!"
      - ""
      - "## Bonbons teilen"
      - 'Spielt zu zweit: Ein Kind ruft „Gerade!" oder „Ungerade!"'
      - 'Bei „Gerade" nennt das andere Kind so schnell wie möglich alle Zahlen,'
      - "bei denen zwei Personen gleich viele Bonbons bekommen: 0, 2, 4"
      - 'Bei „Ungerade" nennt es die Zahlen, bei denen die beiden nicht gleich viele'
      - "bekommen: 1, 3, 5"
      - "Wer am schnellsten alle Zahlen aufsagt, gewinnt einen Punkt!"

  - typ: motivation
    modus: "fakt"
    emoji: "🔢"
    titel: "Wusstest du?"
    text: "Die Zahl 0 ist sehr besonders – sie bedeutet: nichts da! Wer hat die Null erfunden? Die Menschen in Indien vor über 1500 Jahren!"
